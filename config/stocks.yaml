# 自选股配置
# A股代码格式：6位数字（如 600519）
# 港股代码格式：5位数字（如 00700）

watchlist:
  a_stock:
    - code: "600519"
      name: "贵州茅台"
      stop_loss: 1400.0
      target_price: 1800.0
    - code: "000001"
      name: "平安银行"
      stop_loss: 10.0
      target_price: 15.0
    - code: "601318"
      name: "中国平安"
      stop_loss: 40.0
      target_price: 60.0

  hk_stock:
    - code: "00700"
      name: "腾讯控股"
      stop_loss: 300.0
      target_price: 500.0
    - code: "09988"
      name: "阿里巴巴-W"
      stop_loss: 70.0
      target_price: 120.0
    - code: "01810"
      name: "小米集团-W"
      stop_loss: 15.0
      target_price: 30.0

# 预警规则配置
alert_rules:
  - name: "价格突破20日均线"
    type: "ma_cross"
    params:
      period: 20
      direction: "up"
    level: "info"

  - name: "MACD金叉"
    type: "macd_cross"
    params:
      direction: "golden"
    level: "important"

  - name: "放量上涨"
    type: "volume_surge"
    params:
      multiplier: 2.0
      min_change_pct: 3.0
    level: "warning"

  - name: "跌破止损价"
    type: "stop_loss"
    params: {}
    level: "critical"
